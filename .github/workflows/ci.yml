name: Reusable CI

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: "24"
      package_manager:
        required: false
        type: string
        default: "yarn"
      install_command:
        required: false
        type: string
        default: "yarn install --frozen-lockfile"
      pre_build_command:
        required: false
        type: string
        default: ""
      build_command:
        required: false
        type: string
        default: "yarn build"
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
      - run: ${{ inputs.install_command }}
      - run: ${{ inputs.pre_build_command }}
        if: ${{ inputs.pre_build_command != '' }}
      - run: ${{ inputs.build_command }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t ${{ github.event.repository.name }}:ci -f ${{ inputs.dockerfile }} .
